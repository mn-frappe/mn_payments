name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 mn_payments --max-line-length=160 || true

      - name: Run black/isort check
        run: |
          pip install black isort
          isort --check-only .
          black --check .

      - name: Run tests (skip if frappe not available)
        run: |
          python - <<'PY'
          try:
            import importlib
            importlib.import_module('frappe')
            print('frappe available')
            raise SystemExit(0)
          except Exception:
            print('frappe not available; skipping tests')
            raise SystemExit(0)
          PY
          # If frappe is installed in CI, run pytest
          python - <<'PY'
          try:
            import importlib, sys
            importlib.import_module('frappe')
            import pytest
            sys.exit(pytest.main(['-q']))
          except Exception as e:
            print('Skipping pytest (frappe import failed):', e)
            sys.exit(0)
          PY
